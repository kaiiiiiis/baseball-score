<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>野球スコア</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+JP:wght@400;700;900&display=swap');

  :root {
    --board-bg: #1a3a2a;
    --board-light: #24503a;
    --board-dark: #0f2518;
    --amber: #f5c542;
    --amber-dim: #8a7228;
    --cream: #f5f0e1;
    --cream-dark: #e8dcc8;
    --parchment: #faf6eb;
    --rust: #c0392b;
    --rust-light: #e74c3c;
    --forest: #27ae60;
    --forest-light: #2ecc71;
    --brown: #5d4037;
    --brown-light: #795548;
    --wood: #deb887;
    --wood-dark: #a0785a;
    --gold: #d4a017;
    --navy: #1b2838;
    --text-light: #f5f0e1;
    --text-dark: #2c1810;
    --text-muted: #8b7d6b;
    --radius: 6px;
    --radius-sm: 4px;
    --shadow: 0 2px 8px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
    --shadow-inset: inset 0 2px 4px rgba(0,0,0,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans JP', 'DotGothic16', sans-serif;
    background: var(--board-bg);
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.03) 0%, transparent 70%);
    color: var(--cream);
    min-height: 100vh;
    padding-bottom: 32px;
  }

  /* ===== HEADER ===== */
  .app-header {
    background: var(--navy);
    border-bottom: 3px solid var(--gold);
    padding: 12px 16px;
    position: sticky;
    top: 0;
    z-index: 40;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .app-header h1 {
    font-family: 'DotGothic16', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--amber);
    display: flex;
    align-items: center;
    gap: 6px;
    text-shadow: 0 0 8px rgba(245,197,66,0.4);
    letter-spacing: 0.05em;
  }
  .app-header h1 .icon { font-size: 20px; }

  /* ===== SCREEN ===== */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ===== CARD ===== */
  .card {
    background: var(--board-light);
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: var(--radius);
    box-shadow: var(--shadow), var(--shadow-inset);
    padding: 16px;
    margin: 12px 16px;
  }
  .card-title {
    font-family: 'DotGothic16', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--amber);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
    text-shadow: 0 0 6px rgba(245,197,66,0.3);
  }

  /* ===== SETUP SCREEN ===== */
  .setup-hero {
    background: linear-gradient(135deg, var(--navy) 0%, var(--board-dark) 100%);
    border-bottom: 3px solid var(--gold);
    color: var(--cream);
    padding: 32px 20px 24px;
    text-align: center;
  }
  .setup-hero h2 {
    font-family: 'DotGothic16', monospace;
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 4px;
    color: var(--amber);
    text-shadow: 0 0 12px rgba(245,197,66,0.5);
  }
  .setup-hero p { font-size: 14px; opacity: 0.7; color: var(--cream); }

  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--amber-dim);
    margin-bottom: 6px;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 11px 12px;
    border: 2px solid var(--brown-light);
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--text-dark);
    background: var(--cream);
    transition: border-color 0.15s;
    -webkit-appearance: none;
    appearance: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none;
    border-color: var(--amber);
    box-shadow: 0 0 0 3px rgba(245,197,66,0.2);
  }
  .form-textarea { min-height: 90px; resize: vertical; line-height: 1.5; }
  .form-select-wrap { position: relative; }
  .form-select-wrap::after {
    content: '▾';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--brown);
    pointer-events: none;
  }

  .team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .team-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 700;
    font-family: 'DotGothic16', monospace;
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  .team-badge.a { background: #2563eb; color: #fff; }
  .team-badge.b { background: var(--rust); color: #fff; }

  /* ===== BUTTONS ===== */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    border: 2px solid transparent;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.1s;
    font-family: 'Noto Sans JP', sans-serif;
    -webkit-tap-highlight-color: transparent;
    text-shadow: 0 1px 1px rgba(0,0,0,0.2);
  }
  .btn:active { opacity: 0.85; transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(180deg, var(--amber) 0%, var(--gold) 100%);
    color: var(--navy);
    border-color: var(--gold);
    text-shadow: none;
  }
  .btn-danger { background: var(--rust); color: #fff; border-color: #962d22; }
  .btn-success { background: var(--forest); color: #fff; border-color: #1e8449; }
  .btn-warning { background: #d68910; color: #fff; border-color: #b7770d; }
  .btn-ghost {
    background: rgba(255,255,255,0.06);
    color: var(--cream);
    border-color: rgba(255,255,255,0.12);
    text-shadow: none;
  }
  .btn-outline {
    background: transparent;
    color: var(--amber);
    border: 2px solid var(--amber-dim);
    text-shadow: none;
  }

  .btn-full { width: 100%; }
  .btn-sm { padding: 8px 12px; font-size: 13px; }
  .btn-lg { padding: 16px; font-size: 17px; border-radius: var(--radius); }

  /* ===== GAME SCREEN ===== */

  /* Score bar */
  .score-bar {
    background: var(--navy);
    border-bottom: 3px solid var(--gold);
    padding: 14px 16px;
  }
  .score-main {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 10px;
  }
  .score-team {
    flex: 1;
    text-align: center;
  }
  .score-team-name {
    font-family: 'DotGothic16', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--cream-dark);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .score-num {
    font-family: 'DotGothic16', monospace;
    font-size: 42px;
    font-weight: 800;
    line-height: 1;
    color: var(--amber);
    text-shadow: 0 0 16px rgba(245,197,66,0.6), 0 0 4px rgba(245,197,66,0.3);
  }
  .score-divider {
    font-size: 32px;
    font-weight: 300;
    color: rgba(245,197,66,0.3);
  }
  .score-meta {
    display: flex;
    justify-content: center;
    gap: 10px;
  }
  .score-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    font-family: 'DotGothic16', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--cream-dark);
    background: rgba(255,255,255,0.06);
    padding: 4px 10px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .score-chip .val { color: var(--amber); }
  .score-chip.active-team {
    background: rgba(245,197,66,0.12);
    color: var(--amber);
    border-color: rgba(245,197,66,0.3);
  }
  .score-chip.active-team .val { color: var(--amber); }

  /* Diamond */
  .diamond-section {
    background: var(--board-dark);
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: space-around;
    border-bottom: 2px solid rgba(245,197,66,0.1);
    gap: 8px;
  }
  .diamond-container {
    width: 140px;
    height: 140px;
    flex-shrink: 0;
    position: relative;
  }
  .diamond-inner {
    width: 100%;
    height: 100%;
    transform: rotate(45deg);
    position: relative;
  }
  .base {
    position: absolute;
    width: 36px;
    height: 36px;
    border: 2px solid rgba(245,197,66,0.25);
    border-radius: 3px;
    background: rgba(255,255,255,0.04);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    font-family: 'DotGothic16', monospace;
    color: rgba(245,197,66,0.35);
    transition: all 0.2s;
  }
  .base span { transform: rotate(-45deg); display: block; }
  .base.occ {
    background: var(--amber);
    border-color: var(--gold);
    color: var(--navy);
    box-shadow: 0 0 12px rgba(245,197,66,0.5);
  }
  .base.home { left: 52px; bottom: 0; }
  .base.first { right: 0; top: 52px; }
  .base.second { left: 52px; top: 0; }
  .base.third { left: 0; top: 52px; }

  /* Count & Status */
  .game-status {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }
  .count-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .count-label {
    font-family: 'DotGothic16', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--amber-dim);
    width: 28px;
  }
  .count-dots { display: flex; gap: 6px; }
  .dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    transition: all 0.15s;
  }
  .dot.on.strike {
    background: var(--rust-light);
    border-color: var(--rust);
    box-shadow: 0 0 8px rgba(231,76,60,0.5);
  }
  .dot.on.ball {
    background: var(--forest-light);
    border-color: var(--forest);
    box-shadow: 0 0 8px rgba(46,204,113,0.5);
  }
  .dot.on.out {
    background: var(--amber);
    border-color: var(--gold);
    box-shadow: 0 0 8px rgba(245,197,66,0.4);
  }

  .batter-info {
    background: rgba(245,240,225,0.08);
    border: 1px solid rgba(245,197,66,0.15);
    border-radius: var(--radius-sm);
    padding: 0;
    perspective: 600px;
    min-height: 64px;
  }
  .batter-label {
    font-family: 'DotGothic16', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--amber);
    margin-bottom: 1px;
    letter-spacing: 0.08em;
  }
  .batter-name {
    font-family: 'DotGothic16', monospace;
    font-size: 16px;
    font-weight: 800;
    color: var(--cream);
    text-shadow: 0 0 6px rgba(245,240,225,0.3);
  }
  .batter-stats { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* flip card */
  .batter-card {
    width: 100%;
    height: 100%;
    min-height: 64px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(.4,0,.2,1);
    border-radius: var(--radius-sm);
  }
  .batter-card.flipped {
    transform: rotateX(180deg);
  }
  .batter-card-face {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .batter-card-front {
    background: rgba(245,240,225,0.08);
  }
  .batter-card-back {
    background: rgba(245,197,66,0.08);
    transform: rotateX(180deg);
  }
  .batter-nickname {
    font-size: 12px;
    font-weight: 700;
    color: var(--amber);
    margin-top: 2px;
    font-style: italic;
    text-shadow: 0 0 4px rgba(245,197,66,0.3);
  }
  .batter-back-stats {
    font-size: 11px;
    color: var(--cream-dark);
    margin-top: 3px;
    line-height: 1.5;
  }
  .batter-back-label {
    font-family: 'DotGothic16', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--amber);
    margin-bottom: 1px;
    letter-spacing: 0.08em;
  }

  /* Action buttons */
  .action-section {
    padding: 12px 16px;
    background: var(--board-dark);
    border-bottom: 2px solid rgba(245,197,66,0.1);
  }
  .action-title {
    font-family: 'DotGothic16', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--amber-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .hit-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }
  .out-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }
  .count-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }
  .action-btn {
    padding: 14px 4px;
    border-radius: var(--radius-sm);
    border: 2px solid;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.1s;
    font-family: 'Noto Sans JP', sans-serif;
    text-align: center;
    line-height: 1.3;
  }
  .action-btn:active { opacity: 0.85; transform: scale(0.96); }
  .action-btn .btn-icon { font-size: 18px; display: block; margin-bottom: 2px; }
  .action-btn.hit-1b {
    background: rgba(37,99,235,0.15);
    color: #60a5fa;
    border-color: rgba(37,99,235,0.35);
  }
  .action-btn.hit-2b {
    background: rgba(39,174,96,0.15);
    color: var(--forest-light);
    border-color: rgba(39,174,96,0.35);
  }
  .action-btn.hit-3b {
    background: rgba(245,197,66,0.15);
    color: var(--amber);
    border-color: rgba(245,197,66,0.35);
  }
  .action-btn.hit-hr {
    background: rgba(192,57,43,0.2);
    color: var(--rust-light);
    border-color: rgba(192,57,43,0.4);
  }
  .action-btn.act-bb {
    background: rgba(39,174,96,0.15);
    color: var(--forest-light);
    border-color: rgba(39,174,96,0.35);
  }
  .action-btn.act-out {
    background: rgba(255,255,255,0.05);
    color: var(--cream-dark);
    border-color: rgba(255,255,255,0.12);
  }
  .action-btn.act-k {
    background: rgba(192,57,43,0.15);
    color: var(--rust-light);
    border-color: rgba(192,57,43,0.35);
  }
  .action-btn.act-fout {
    background: rgba(255,255,255,0.05);
    color: var(--text-muted);
    border-color: rgba(255,255,255,0.08);
  }

  .count-btn {
    padding: 12px 4px;
    border-radius: var(--radius-sm);
    border: 2px solid;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.1s;
    font-family: 'Noto Sans JP', sans-serif;
    text-align: center;
  }
  .count-btn:active { opacity: 0.85; transform: scale(0.96); }
  .count-btn.strike-btn {
    background: rgba(192,57,43,0.15);
    color: var(--rust-light);
    border-color: rgba(192,57,43,0.3);
  }
  .count-btn.ball-btn {
    background: rgba(39,174,96,0.15);
    color: var(--forest-light);
    border-color: rgba(39,174,96,0.3);
  }
  .count-btn.clear-btn {
    background: rgba(255,255,255,0.05);
    color: var(--cream-dark);
    border-color: rgba(255,255,255,0.1);
  }

  .util-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }

  /* Tabs */
  .tab-bar {
    display: flex;
    background: var(--navy);
    border-bottom: 2px solid var(--gold);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-item {
    flex: 1;
    min-width: 80px;
    padding: 12px 8px;
    font-family: 'DotGothic16', monospace;
    font-size: 12px;
    font-weight: 600;
    color: rgba(245,240,225,0.4);
    text-align: center;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .tab-item.active {
    color: var(--amber);
    border-bottom-color: var(--amber);
    text-shadow: 0 0 8px rgba(245,197,66,0.4);
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Scoreboard */
  .score-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .score-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 260px;
    font-family: 'DotGothic16', monospace;
  }
  .score-table th {
    background: var(--navy);
    padding: 8px 10px;
    font-size: 11px;
    font-weight: 600;
    color: var(--amber-dim);
    border-bottom: 2px solid var(--gold);
    white-space: nowrap;
  }
  .score-table td {
    padding: 10px 10px;
    border-bottom: 1px solid rgba(245,197,66,0.1);
    text-align: center;
    font-weight: 600;
    color: var(--cream);
  }
  .score-table .team-col {
    text-align: left;
    font-weight: 700;
    color: var(--cream);
  }
  .score-table .total-col {
    background: rgba(245,197,66,0.12);
    color: var(--amber);
    font-weight: 800;
    text-shadow: 0 0 6px rgba(245,197,66,0.3);
  }
  .score-table .current-inning { background: rgba(245,197,66,0.08); }

  /* Lineup */
  .lineup-section { margin: 12px 16px; }
  .lineup-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .lineup-title {
    font-family: 'DotGothic16', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--amber);
    letter-spacing: 0.05em;
  }
  .player-row {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    margin-bottom: 4px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    gap: 10px;
  }
  .player-row.current {
    background: rgba(245,197,66,0.1);
    border-color: rgba(245,197,66,0.25);
  }
  .player-order {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    color: var(--cream-dark);
    font-family: 'DotGothic16', monospace;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .player-row.current .player-order {
    background: var(--amber);
    color: var(--navy);
  }
  .player-name {
    font-size: 14px;
    font-weight: 700;
    flex: 1;
    color: var(--cream);
  }
  .player-stats-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .stat-chip {
    font-family: 'DotGothic16', monospace;
    font-size: 10px;
    font-weight: 600;
    background: rgba(255,255,255,0.06);
    color: var(--cream-dark);
    padding: 2px 5px;
    border-radius: 3px;
  }
  .stat-chip.avg {
    background: rgba(245,197,66,0.12);
    color: var(--amber);
  }

  /* Log */
  .log-item {
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 13px;
    color: var(--cream-dark);
    line-height: 1.4;
  }
  .log-item:last-child { border-bottom: none; }
  .log-time { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  .log-item.score-log { color: var(--amber); font-weight: 700; }

  /* Stats table */
  .stats-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .stats-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    min-width: 460px;
  }
  .stats-table th {

      初回設定の手順は <strong>gas_setup.md</strong> を参照。
    </p>
    <div class="form-group">
      <label class="form-label">Apps Script URL</label>

    </div>

      ※ URLは次回も使えるようにブラウザに保存されます
    </div>

      <button class="btn btn-ghost btn-full" onclick="closeSheetModal()">キャンセル</button>

<script>
/* ========== STATE ========== */
let match = null;
let historyStack = [];
let currentTab = 'board';
let count = { strikes: 0, balls: 0 };

/* ========== GAS URL 共有管理 ========== */
function getGasUrl() {
  // セットアップ画面の入力 → シートモーダルの入力 → localStorage の優先順
  const fromSetup = document.getElementById('gasUrlSetup')?.value.trim();
  const fromModal = document.getElementById('gasUrl')?.value.trim();
  return fromSetup || fromModal || localStorage.getItem('gasUrl') || '';
}
function setGasUrl(url) {
  if (!url) return;
  localStorage.setItem('gasUrl', url);
  const s = document.getElementById('gasUrlSetup');
  const m = document.getElementById('gasUrl');
  if (s) s.value = url;
  if (m) m.value = url;
}

// ページ読み込み時にURLを復元（自動読み込みなし）
window.addEventListener('load', () => {
  const saved = localStorage.getItem('gasUrl') || '';
  if (saved) {
    const s = document.getElementById('gasUrlSetup');
    if (s) s.value = saved;
  }
});

/* ========== スプレッドシートから読み込み ========== */
async function loadFromSheet() {
  const url = getGasUrl();
  if (!url) {
    showLoadStatus('URLを入力してください', 'error');
    return;
  }
  setGasUrl(url);
  showLoadStatus('読み込み中...', 'info');

  try {
    const res = await fetch(`${url}?action=load`, { method: 'GET' });
    const json = await res.json();
    if (json.status !== 'ok') {
      showLoadStatus('読み込み失敗：' + (json.message || 'エラー'), 'error');
      return;
    }

    // チームA・B の選手名をテキストエリアに反映（不要なので削除）
    const teams = json.teams || {};

    // 累積成績・異名をグローバルに保持（試合開始後に適用）
    window._sheetStats = json.stats || {};
    // 異名マップ: { 選手名: 異名 }
    window._nicknames = {};
    Object.entries(window._sheetStats).forEach(([name, s]) => {
      if (s.nickname) window._nicknames[name] = s.nickname;
    });

    const total = Object.keys(window._sheetStats).length;
    showLoadStatus(`✅ ${total}人の成績を読み込みました`, 'success');
  } catch (err) {
    showLoadStatus('読み込み失敗：' + err.message, 'error');
  }
}

function showLoadStatus(msg, type) {
  const el = document.getElementById('loadStatus');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = type === 'success' ? '#f0fdf4' : type === 'error' ? '#fef2f2' : '#eff6ff';
  el.style.color = type === 'success' ? '#15803d' : type === 'error' ? '#dc2626' : '#1d4ed8';
}

/* ========== HELPERS ========== */
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]);
}
function calcAvg(hits, ab) {
  if (!ab) return '.---';
  const v = hits / ab;
  return '.' + String(Math.round(v * 1000)).padStart(3, '0');
}
function calcObp(hits, walks, pa) {
  if (!pa) return '.---';
  const v = (hits + walks) / pa;
  return '.' + String(Math.round(v * 1000)).padStart(3, '0');
}
// 累積成績込みの値を返す
function totalVal(p, key) {
  return (p[key] || 0) + (p['_prev' + key.charAt(0).toUpperCase() + key.slice(1)] || 0);
}
function totalAvg(p) {
  const ab = totalVal(p, 'ab');
  const hits = totalVal(p, 'hits');
  return calcAvg(hits, ab);
}
function totalObp(p) {
  const pa = totalVal(p, 'pa');
  const hits = totalVal(p, 'hits');
  const walks = totalVal(p, 'walks');
  return calcObp(hits, walks, pa);
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' ' + type : '') + ' show';
  setTimeout(() => { t.className = 'toast' + (type ? ' ' + type : ''); }, 2000);
}

/* ========== PLAYER / TEAM FACTORIES ========== */
function makePlayer(nameOrObj) {
  if (typeof nameOrObj === 'object' && nameOrObj !== null) {
    const { name, nickname } = nameOrObj;
    return { name, nickname: nickname || '', pa:0, ab:0, hits:0, doubles:0, triples:0, hrs:0, ks:0, walks:0, rbi:0 };
  }
  return { name: nameOrObj, nickname: '', pa:0, ab:0, hits:0, doubles:0, triples:0, hrs:0, ks:0, walks:0, rbi:0 };
}
function parsePlayersFromTA(text, lineupSize) {
  const lines = (text || '').split('\n').map(s => s.trim()).filter(Boolean);
  const arr = lines.slice(0, lineupSize).map(line => {
    const [name, nickname] = line.split(',').map(s => s.trim());
    return { name: name || line, nickname: nickname || '' };
  });
  for (let i = arr.length; i < lineupSize; i++) arr.push({ name: `選手${i+1}`, nickname: '' });
  return arr;
}
function createTeam(name, playersArr, maxI) {
  const players = (playersArr || []).map(makePlayer);
  return {
    name: name || 'チーム',
    players,
    scores: Array.from({ length: parseInt(maxI || 0, 10) }, () => 0),
    total: 0,
    battingIndex: 0,
    outs: 0,
    bases: [null, null, null]
  };
}

/* ========== HISTORY ========== */
function pushHistory() {
  if (!match) return;
  historyStack.push(JSON.stringify({ match, count }));
  if (historyStack.length > 500) historyStack.shift();
}

/* ========== LOGGING ========== */
function addLog(text, isScore = false) {
  if (!match) return;
  const team = match.teams[match.currentTeam];
  const entry = { text, inning: match.inning, teamName: team.name, isScore };
  match.log.unshift(entry);
  if (match.log.length > 500) match.log.pop();
}

/* ========== SCORE HELPERS ========== */
function ensureScoresLength() {
  if (!match) return;
  const need = parseInt(match.maxInnings || 0, 10);
  match.teams.forEach(t => {
    if (!Array.isArray(t.scores)) t.scores = Array.from({ length: need }, () => 0);
    while (t.scores.length < need) t.scores.push(0);
    if (t.scores.length > need) t.scores = t.scores.slice(0, need);
  });
}
function recalcTotals() {
  if (!match) return;
  ensureScoresLength();
  match.teams.forEach(t => {
    t.total = (t.scores || []).reduce((s, v) => s + (Number.isFinite(v) ? v : 0), 0);
  });
}

/* ========== COUNT ========== */
function addStrike() {
  if (!match) return;
  count.strikes = Math.min(count.strikes + 1, 2);
  refreshCountDots();
}
function addBall() {
  if (!match) return;
  count.balls = Math.min(count.balls + 1, 3);
  refreshCountDots();
}
function clearCount() {
  count = { strikes: 0, balls: 0 };
  refreshCountDots();
}
function refreshCountDots() {
  const maxS = 2, maxB = 3;
  const maxO = match ? match.outsToChange : 3;
  const outs = match ? match.teams[match.currentTeam].outs : 0;

  const sd = document.getElementById('strikeDots');
  const bd = document.getElementById('ballDots');
  const od = document.getElementById('outDots');
  if (!sd) return;

  sd.innerHTML = Array.from({ length: maxS }, (_, i) =>
    `<div class="dot${i < count.strikes ? ' on strike' : ''}"></div>`).join('');
  bd.innerHTML = Array.from({ length: maxB }, (_, i) =>
    `<div class="dot${i < count.balls ? ' on ball' : ''}"></div>`).join('');
  od.innerHTML = Array.from({ length: maxO }, (_, i) =>
    `<div class="dot${i < outs ? ' on out' : ''}"></div>`).join('');
}

/* ========== ADVANCE LOGIC ========== */
function advanceOnHit(team, hitType, batterIndex) {
  let runs = 0;
  const b = team.bases;
  if (hitType === '1B') {
    if (b[2] !== null) { runs++; b[2] = null; }
    b[2] = b[1]; b[1] = b[0]; b[0] = batterIndex;
  } else if (hitType === '2B') {
    if (b[2] !== null) { runs++; }
    if (b[1] !== null) { runs++; }
    b[2] = b[0]; b[1] = batterIndex; b[0] = null;
  } else if (hitType === '3B') {
    for (let i = 0; i < 3; i++) { if (b[i] !== null) { runs++; b[i] = null; } }
    b[2] = batterIndex; b[1] = null; b[0] = null;
  } else if (hitType === 'HR') {
    for (let i = 0; i < 3; i++) { if (b[i] !== null) { runs++; b[i] = null; } }
    runs++;
  }
  return runs;
}
function processWalk(team, batterIndex) {
  const old = team.bases.slice();
  if (old[0] === null) { team.bases[0] = batterIndex; return 0; }
  if (old[1] === null) { team.bases[1] = old[0]; team.bases[0] = batterIndex; return 0; }
  if (old[2] === null) { team.bases[2] = old[1]; team.bases[1] = old[0]; team.bases[0] = batterIndex; return 0; }
  team.bases[2] = old[1]; team.bases[1] = old[0]; team.bases[0] = batterIndex;
  return 1;
}

/* ========== GAME START ========== */
function startMatch() {
  const maxI = parseInt(document.getElementById('maxInnings').value, 10) || 3;
  const outsToChange = parseInt(document.getElementById('outsToChange').value, 10) || 3;
  const lineupSize = Math.max(1, Math.min(9, parseInt(document.getElementById('lineupSize').value, 10) || 3));
  const Aname = document.getElementById('teamAName').value || 'チームA';
  const Bname = document.getElementById('teamBName').value || 'チームB';
  const Aplayers = parsePlayersFromTA(document.getElementById('teamAPlayersTA').value, lineupSize);
  const Bplayers = parsePlayersFromTA(document.getElementById('teamBPlayersTA').value, lineupSize);

  match = {
    maxInnings: maxI,
    outsToChange,
    inning: 1,
    currentTeam: 0,
    halfInningCount: 0,
    lineupSize,
    teams: [
      createTeam(Aname, Aplayers, maxI),
      createTeam(Bname, Bplayers, maxI)
    ],
    finished: false,
    log: []
  };

  // スプレッドシートから読み込んだ累積成績を適用
  if (window._sheetStats) {
    match.teams.forEach(t => {
      t.players.forEach(p => {
        const s = window._sheetStats[p.name];
        if (s) {
          p._prevGames   = s.games   || 0;
          p._prevPa      = s.pa      || 0;
          p._prevAb      = s.ab      || 0;
          p._prevHits    = s.hits    || 0;
          p._prevDoubles = s.doubles || 0;
          p._prevTriples = s.triples || 0;
          p._prevHrs     = s.hrs     || 0;
          p._prevWalks   = s.walks   || 0;
          p._prevKs      = s.ks      || 0;
          p._prevRbi     = s.rbi     || 0;
          if (s.nickname) p.nickname = s.nickname;
        }
      });
    });
  }

  recalcTotals();
  historyStack = [];
  count = { strikes: 0, balls: 0 };

  showScreen('game');
  refreshUI();
}

/* ========== SCREEN SWITCH ========== */
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  if (name === 'game') {
    document.getElementById('headerRight').innerHTML =
      `<button class="btn btn-ghost btn-sm" onclick="resetAll()">リセット</button>`;
  } else {
    document.getElementById('headerRight').innerHTML = '';
  }
}

/* ========== TAB SWITCH ========== */
function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab-item').forEach((el, i) => {
    el.classList.toggle('active', ['board','lineup','stats','log'][i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'stats') buildStatsTable();
}

/* ========== RESULT ACTION ========== */
function doResult(code) {
  if (!match || match.finished) return;
  pushHistory();

  const team = match.teams[match.currentTeam];
  const pIndex = team.battingIndex % team.players.length;
  const player = team.players[pIndex];
  const inningIdx = match.inning - 1;

  player.pa = (player.pa || 0) + 1;

  if (code === 'OUT' || code === 'FOUT') {
    player.ab = (player.ab || 0) + 1;
    team.outs++;
    addLog(`${player.name} がアウト`);
    showToast(`${player.name} アウト`);
  } else if (code === 'K') {
    player.ab = (player.ab || 0) + 1;
    player.ks = (player.ks || 0) + 1;
    team.outs++;
    addLog(`${player.name} が三振`);
    showToast(`${player.name} 三振 K`);
  } else if (code === 'BB') {
    player.walks = (player.walks || 0) + 1;
    const runs = processWalk(team, pIndex);
    if (runs > 0) {
      player.rbi = (player.rbi || 0) + runs;
      ensureScoresLength();
      team.scores[inningIdx] = (team.scores[inningIdx] || 0) + runs;
      recalcTotals();
      addLog(`${player.name} 押し出し → ${runs}点`, true);
      showToast(`押し出し +${runs}点！`, 'score');
    } else {
      addLog(`${player.name} 四球`);
      showToast(`${player.name} 四球`);
    }
  } else {
    player.ab = (player.ab || 0) + 1;
    player.hits = (player.hits || 0) + 1;
    let runs = 0;
    let hitLabel = '';
    if (code === '1B') { runs = advanceOnHit(team, '1B', pIndex); hitLabel = '1塁打'; }
    if (code === '2B') { player.doubles++; runs = advanceOnHit(team, '2B', pIndex); hitLabel = '2塁打'; }
    if (code === '3B') { player.triples++; runs = advanceOnHit(team, '3B', pIndex); hitLabel = '3塁打'; }
    if (code === 'HR') { player.hrs++; runs = advanceOnHit(team, 'HR', pIndex); hitLabel = '本塁打🔴'; }
    addLog(`${player.name} ${hitLabel}`, runs > 0);
    if (runs > 0) {
      player.rbi = (player.rbi || 0) + runs;
      ensureScoresLength();
      team.scores[inningIdx] = (team.scores[inningIdx] || 0) + runs;
      recalcTotals();
      addLog(`→ ${runs}点入る（${player.name} ${runs}RBI）`, true);
      showToast(`${player.name} ${hitLabel}！ +${runs}点`, 'score');
    } else {
      showToast(`${player.name} ${hitLabel}！`);
    }
  }

  team.battingIndex = (team.battingIndex + 1) % team.players.length;
  clearCount();

  if (team.outs >= match.outsToChange) finishHalfInning();

  refreshUI();
  checkFinish();
}

/* ========== HALF INNING END ========== */
function finishHalfInning() {
  const cur = match.currentTeam;
  match.teams[cur].outs = 0;
  match.teams[cur].bases = [null, null, null];
  match.halfInningCount = (match.halfInningCount || 0) + 1;

  if (cur === 0) {
    match.currentTeam = 1;
  } else {
    match.currentTeam = 0;
    match.inning++;
  }

  if (match.halfInningCount >= match.maxInnings * 2) {
    match.finished = true;
  }
}

/* ========== UTILS ========== */
function forceSwitch() {
  if (!match || match.finished) return;
  pushHistory();
  match.teams[match.currentTeam].outs = match.outsToChange;
  addLog('強制交代');
  finishHalfInning();
  refreshUI();
  checkFinish();
}
function undoLast() {
  if (!historyStack.length) { showToast('取り消す操作がありません'); return; }
  try {
    const prev = JSON.parse(historyStack.pop());
    match = prev.match;
    count = prev.count || { strikes: 0, balls: 0 };
    showScreen('game');
    refreshUI();
    showToast('取り消しました');
  } catch (e) { showToast('取り消し失敗'); }
}
function resetAll() {
  if (!confirm('本当にリセットしますか？')) return;
  match = null; historyStack = []; count = { strikes: 0, balls: 0 };
  showScreen('setup');
}

/* ========== BATTER FLIP CARD ========== */
let _batterFlipTimer = null;
let _batterFlipState = false; // false=表, true=裏

function resetBatterFlip() {
  // 表面に戻す
  _batterFlipState = false;
  const card = document.getElementById('batterFlipCard');
  if (card) card.classList.remove('flipped');
  // タイマーリセット
  if (_batterFlipTimer) clearInterval(_batterFlipTimer);
  _batterFlipTimer = setInterval(() => {
    _batterFlipState = !_batterFlipState;
    const c = document.getElementById('batterFlipCard');
    if (c) c.classList.toggle('flipped', _batterFlipState);
  }, 4000);
}

/* ========== REFRESH UI ========== */
function refreshUI() {
  if (!match) return;
  recalcTotals();

  const t0 = match.teams[0], t1 = match.teams[1];
  const team = match.teams[match.currentTeam];

  document.getElementById('scoreNameA').textContent = t0.name;
  document.getElementById('scoreNameB').textContent = t1.name;
  document.getElementById('scoreA').textContent = t0.total || 0;
  document.getElementById('scoreB').textContent = t1.total || 0;

  const half = match.currentTeam === 0 ? '表' : '裏';
  document.getElementById('inningChip').textContent = `${match.inning}回${half}`;
  document.getElementById('outChip').textContent = `アウト ${team.outs} / ${match.outsToChange}`;
  document.getElementById('attackChip').textContent = `${team.name} 攻撃`;

  // bases
  document.getElementById('base1').classList.toggle('occ', team.bases[0] !== null);
  document.getElementById('base2').classList.toggle('occ', team.bases[1] !== null);
  document.getElementById('base3').classList.toggle('occ', team.bases[2] !== null);

  // batter
  const pIdx = team.players.length ? (team.battingIndex % team.players.length) : 0;
  const p = team.players[pIdx];
  if (p) {
    document.getElementById('currentBatterName').textContent = `${pIdx + 1}. ${p.name}`;
    // 異名: p.nickname → _nicknames[名前] → なし の優先順
    const nick = p.nickname || (window._nicknames && window._nicknames[p.name]) || '';
    document.getElementById('currentBatterNickname').textContent = nick;
    const avg = totalAvg(p);
    const obp = totalObp(p);
    document.getElementById('currentBatterStats').innerHTML =
      `打率 <b>${avg}</b>　出塁率 <b>${obp}</b><br>${totalVal(p,'hits')}安打　${totalVal(p,'hrs')}HR　${totalVal(p,'rbi')}打点`;
    // カードを表面に戻してタイマーリセット
    resetBatterFlip();
  }

  refreshCountDots();
  buildScoreboard();
  buildLineups();
  buildLog();
  if (currentTab === 'stats') buildStatsTable();
}

/* ========== SCOREBOARD ========== */
function buildScoreboard() {
  const wrap = document.getElementById('scoreTableWrap');
  if (!match) { wrap.innerHTML = ''; return; }
  ensureScoresLength();
  recalcTotals();
  const maxI = match.maxInnings;
  let html = `<table class="score-table"><thead><tr><th class="team-col">チーム</th>`;
  for (let i = 1; i <= maxI; i++) {
    const isCur = (i === match.inning && !match.finished);
    html += `<th${isCur ? ' class="current-inning"' : ''}>${i}</th>`;
  }
  html += `<th>計</th></tr></thead><tbody>`;
  match.teams.forEach(t => {
    html += `<tr><td class="team-col">${escapeHtml(t.name)}</td>`;
    for (let i = 0; i < maxI; i++) {
      const v = Number.isFinite(t.scores[i]) ? t.scores[i] : 0;
      html += `<td>${v}</td>`;
    }
    html += `<td class="total-col">${t.total || 0}</td></tr>`;
  });
  html += `</tbody></table>`;
  wrap.innerHTML = html;
}

/* ========== LINEUPS ========== */
function buildLineups() {
  const wrap = document.getElementById('lineupsWrap');
  if (!match) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = '';
  match.teams.forEach((t, ti) => {
    const div = document.createElement('div');
    div.className = 'lineup-section';
    const badge = ti === 0 ? 'a' : 'b';
    div.innerHTML = `
      <div class="lineup-header">
        <div class="lineup-title"><span class="team-badge ${badge}">${escapeHtml(t.name)}</span></div>
      </div>`;
    t.players.forEach((p, idx) => {
      const isCurrent = (match.currentTeam === ti) && ((t.battingIndex % t.players.length) === idx);
      const avg = totalAvg(p);
      const el = document.createElement('div');
      el.className = 'player-row' + (isCurrent ? ' current' : '');
      el.innerHTML = `
        <div class="player-order">${idx + 1}</div>
        <div class="player-name" onclick="openRenameModal(${ti},${idx})" style="cursor:pointer;" title="タップして名前変更">${escapeHtml(p.name)} <span style="font-size:10px;color:var(--gray-400);">✎</span></div>
        <div class="player-stats-row">
          <span class="stat-chip avg">${avg}</span>
          <span class="stat-chip">${totalVal(p,'pa')}PA</span>
          <span class="stat-chip">${totalVal(p,'hits')}H</span>
          <span class="stat-chip">${totalVal(p,'rbi')}RBI</span>
          ${totalVal(p,'hrs') > 0 ? `<span class="stat-chip">HR×${totalVal(p,'hrs')}</span>` : ''}
        </div>`;
      div.appendChild(el);
    });
    wrap.appendChild(div);
  });
}

/* ========== STATS TABLE ========== */
function buildStatsTable() {
  const wrap = document.getElementById('statsTableWrap');
  if (!match) { wrap.innerHTML = ''; return; }
  let html = `<table class="stats-table">
    <thead><tr>
      <th>選手</th><th>PA</th><th>AB</th><th>H</th><th>2B</th><th>3B</th><th>HR</th>
      <th>K</th><th>BB</th><th>RBI</th><th>打率</th><th>出塁率</th>
    </tr></thead><tbody>`;
  match.teams.forEach(t => {
    html += `<tr class="team-header"><td colspan="12">${escapeHtml(t.name)}</td></tr>`;

        <td>${escapeHtml(p.name)}</td>
        <td>${totalVal(p,'pa')}</td><td>${totalVal(p,'ab')}</td><td>${totalVal(p,'hits')}</td>
        <td>${totalVal(p,'doubles')}</td><td>${totalVal(p,'triples')}</td><td>${totalVal(p,'hrs')}</td>
        <td>${totalVal(p,'ks')}</td><td>${totalVal(p,'walks')}</td><td>${totalVal(p,'rbi')}</td>

      </tr>`;

/* ========== LOG ========== */
function buildLog() {
  const wrap = document.getElementById('logWrap');
  if (!match) { wrap.innerHTML = ''; return; }
  if (!match.log.length) { wrap.innerHTML = '<div class="log-item" style="color:var(--gray-400)">まだ記録がありません</div>'; return; }
  wrap.innerHTML = match.log.slice(0, 100).map(entry => {
    const isObj = typeof entry === 'object';
    const text = isObj ? entry.text : entry;
    const inning = isObj ? entry.inning : '';
    const teamName = isObj ? entry.teamName : '';
    const isScore = isObj ? entry.isScore : false;
    return `<div class="log-item${isScore ? ' score-log' : ''}">
      ${escapeHtml(text)}
      ${inning ? `<div class="log-time">${inning}回 ${teamName}</div>` : ''}
    </div>`;
  }).join('');
}

/* ========== FINISH ========== */

    refreshUI();
    setTimeout(() => showResult(), 200);
  }
}

/* ========== RENAME PLAYER ========== */
let _renameTarget = null; // { ti, idx }

function openRenameModal(ti, idx) {
  _renameTarget = { ti, idx };
  const name = match.teams[ti].players[idx].name;
  document.getElementById('renameInput').value = name;
  document.getElementById('renameModal').classList.add('open');
  setTimeout(() => document.getElementById('renameInput').focus(), 100);
}

function closeRenameModal() {
  document.getElementById('renameModal').classList.remove('open');
  _renameTarget = null;
}

function applyRename() {
  if (!_renameTarget) return;
  const newName = document.getElementById('renameInput').value.trim();
  if (!newName) { showToast('名前を入力してください', 'error'); return; }
  const { ti, idx } = _renameTarget;
  const oldName = match.teams[ti].players[idx].name;
  match.teams[ti].players[idx].name = newName;
  // ログの名前も更新
  match.log = match.log.map(entry => {
    if (typeof entry === 'object' && entry.text) {
      return { ...entry, text: entry.text.replaceAll(oldName, newName) };
    }
    if (typeof entry === 'string') return entry.replaceAll(oldName, newName);
    return entry;
  });
  // match はインメモリ管理なので保存不要
  closeRenameModal();
  refreshUI();
  showToast(`${oldName} → ${newName} に変更しました`, 'score');
}

// Enterキーで確定
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('renameModal').classList.contains('open')) {
    applyRename();
  }
  if (e.key === 'Escape' && document.getElementById('renameModal').classList.contains('open')) {
    closeRenameModal();
  }
});

function openPitcherModal() {
  recalcTotals();
  const wrap = document.getElementById('pitcherForms');
  wrap.innerHTML = '';
  match.teams.forEach((t, ti) => {
    const badge = ti === 0 ? 'a' : 'b';
    const saved = (match.pitchers && match.pitchers[ti]) || {};

    // 相手チームのデータから自動計算
    const opp = match.teams[ti === 0 ? 1 : 0];
    const autoBf   = saved.bf   !== undefined ? saved.bf   : opp.players.reduce((s, p) => s + (p.pa || 0), 0);
    const autoH    = saved.hits !== undefined ? saved.hits : opp.players.reduce((s, p) => s + (p.hits || 0), 0);
    const autoK    = saved.ks   !== undefined ? saved.ks   : opp.players.reduce((s, p) => s + (p.ks || 0), 0);
    const autoBb   = saved.walks!== undefined ? saved.walks: opp.players.reduce((s, p) => s + (p.walks || 0), 0);
    const autoR    = saved.runs !== undefined ? saved.runs : (opp.total || 0);
    const autoEr   = saved.er   !== undefined ? saved.er   : (opp.total || 0);
    const autoName = saved.name || (t.players[0] ? t.players[0].name : `投手${ti+1}`);
    const autoIp   = saved.ip  || '';

    wrap.innerHTML += `
      <div style="margin-bottom:20px;">
        <span class="team-badge ${badge}">${escapeHtml(t.name)}</span>
        <div style="font-size:11px;color:var(--gray-400);margin:4px 0 8px;">※ BF・被安打・三振・四球・失点は自動入力済み。投球回と自責点を確認してください。</div>
        <div class="form-group" style="margin-top:8px;">
          <label class="form-label">投手名</label>
          <input class="form-input" id="p_name_${ti}" value="${escapeHtml(autoName)}" placeholder="投手名" />
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div class="form-group">
            <label class="form-label">投球回 (例: 3.1)</label>
            <input class="form-input" type="number" step="0.1" id="p_ip_${ti}" value="${autoIp}" placeholder="3.0" />
          </div>
          <div class="form-group">
            <label class="form-label">打者数 (BF)</label>
            <input class="form-input" type="number" id="p_bf_${ti}" value="${autoBf}" placeholder="0" />
          </div>
          <div class="form-group">
            <label class="form-label">失点</label>
            <input class="form-input" type="number" id="p_r_${ti}" value="${autoR}" placeholder="0" />
          </div>
          <div class="form-group">
            <label class="form-label">自責点</label>
            <input class="form-input" type="number" id="p_er_${ti}" value="${autoEr}" placeholder="0" />
          </div>
          <div class="form-group">
            <label class="form-label">被安打</label>
            <input class="form-input" type="number" id="p_h_${ti}" value="${autoH}" placeholder="0" />
          </div>
          <div class="form-group">
            <label class="form-label">三振</label>
            <input class="form-input" type="number" id="p_k_${ti}" value="${autoK}" placeholder="0" />
          </div>
          <div class="form-group">
            <label class="form-label">四球</label>
            <input class="form-input" type="number" id="p_bb_${ti}" value="${autoBb}" placeholder="0" />
          </div>
        </div>
      </div>`;
  });
  document.getElementById('pitcherModal').classList.add('open');
}
function closePitcherModal() {
  document.getElementById('pitcherModal').classList.remove('open');
}
function savePitcherInputs() {
  if (!match) return;
  match.pitchers = [];
  match.teams.forEach((t, ti) => {
    const ip = parseFloat(document.getElementById(`p_ip_${ti}`)?.value) || 0;
    const er = parseInt(document.getElementById(`p_er_${ti}`)?.value) || 0;
    // ERA = 自責点 × 3 ÷ 投球回
    const era = ip > 0 ? ((er * 3) / ip).toFixed(2) : '---';
    match.pitchers[ti] = {
      name:  document.getElementById(`p_name_${ti}`)?.value.trim() || `投手${ti+1}`,
      ip,
      bf:    parseInt(document.getElementById(`p_bf_${ti}`)?.value)  || 0,
      runs:  parseInt(document.getElementById(`p_r_${ti}`)?.value)   || 0,
      er,
      hits:  parseInt(document.getElementById(`p_h_${ti}`)?.value)   || 0,
      ks:    parseInt(document.getElementById(`p_k_${ti}`)?.value)   || 0,
      walks: parseInt(document.getElementById(`p_bb_${ti}`)?.value)  || 0,
      era
    };
  });
}

/* ========== SHEET MODAL ========== */
function openSheetModal() {
  const saved = getGasUrl();
  document.getElementById('gasUrl').value = saved;
  document.getElementById('sheetStatus').style.display = 'none';
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('sendBtn').textContent = '送信する';
  document.getElementById('sheetModal').classList.add('open');
}
function closeSheetModal() {
  document.getElementById('sheetModal').classList.remove('open');
}

async function sendToSheet() {
  if (!match) return;
  const url = document.getElementById('gasUrl').value.trim();
  if (!url) { showStatus('URLを入力してください', 'error'); return; }

  setGasUrl(url);
  ensureScoresLength();
  recalcTotals();

  // ペイロード組み立て（選手成績：打率降順ソート・選手Xは除外）
  const players = [];
  match.teams.forEach(t => {
    t.players.forEach(p => {
      // 「選手1」「選手2」…のような自動補完名は送信しない
      if (/^選手\d+$/.test(p.name)) return;
      const ab = p.ab || 0;
      const hits = p.hits || 0;
      players.push({
        name: p.name,
        pa: p.pa||0, ab, hits,
        doubles: p.doubles||0, triples: p.triples||0, hrs: p.hrs||0,
        walks: p.walks||0, ks: p.ks||0, rbi: p.rbi||0,
        _avg: ab > 0 ? hits / ab : -1
      });
    });
  });
  players.sort((a, b) => b._avg - a._avg);
  players.forEach(p => delete p._avg);

  const payload = { players, pitchers: match.pitchers || [] };

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';
  showStatus('送信中...', 'info');

  try {
    // GASはno-corsで送信（レスポンスは読めないが書き込みは成功する）
    const encoded = encodeURIComponent(JSON.stringify(payload));
    const getUrl = `${url}?data=${encoded}`;

    // まずGETで試みる（URLが長すぎる場合はPOSTにfallback）
    if (getUrl.length < 2000) {
      await fetch(getUrl, { method: 'GET', mode: 'no-cors' });
    } else {
      await fetch(url, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify(payload)
      });
    }

    showStatus('✅ スプレッドシートに記録しました！', 'success');
    btn.textContent = '✅ 送信完了';
    showToast('スプレッドシートに記録しました！', 'score');
  } catch (err) {
    showStatus('❌ 送信失敗：' + err.message, 'error');
    btn.disabled = false;
    btn.textContent = '送信する';
  }
}

function showStatus(msg, type) {
  const el = document.getElementById('sheetStatus');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = type === 'success' ? '#f0fdf4' : type === 'error' ? '#fef2f2' : '#eff6ff';
  el.style.color = type === 'success' ? '#15803d' : type === 'error' ? '#dc2626' : '#1d4ed8';
}
