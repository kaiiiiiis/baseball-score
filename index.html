<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>野球スコア</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');

  :root {
    --bg-deep: #0a0e1a;
    --bg-card: rgba(15, 23, 42, 0.85);
    --bg-card-solid: #0f172a;
    --bg-glass: rgba(15, 23, 42, 0.6);
    --cyan: #06b6d4;
    --cyan-dim: #0e7490;
    --cyan-glow: rgba(6, 182, 212, 0.35);
    --cyan-subtle: rgba(6, 182, 212, 0.08);
    --white: #f1f5f9;
    --white-dim: #94a3b8;
    --white-muted: #475569;
    --accent: #f59e0b;
    --accent-glow: rgba(245, 158, 11, 0.3);
    --danger: #ef4444;
    --danger-glow: rgba(239, 68, 68, 0.3);
    --success: #10b981;
    --success-glow: rgba(16, 185, 129, 0.3);
    --purple: #a855f7;
    --purple-glow: rgba(168, 85, 247, 0.3);
    --border: rgba(6, 182, 212, 0.15);
    --border-bright: rgba(6, 182, 212, 0.3);
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
    --glass-blur: blur(16px);
    --radius: 16px;
    --radius-sm: 10px;
    --radius-xs: 6px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Noto Sans JP', -apple-system, sans-serif;
    background: var(--bg-deep);
    color: var(--white);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 20% 10%, rgba(6,182,212,0.08), transparent),
      radial-gradient(ellipse 500px 500px at 80% 90%, rgba(168,85,247,0.06), transparent),
      radial-gradient(ellipse 400px 300px at 50% 50%, rgba(245,158,11,0.04), transparent);
    pointer-events: none;
    z-index: 0;
  }

  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: block; }

  /* ========== HEADER ========== */
  .app-header {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(10, 14, 26, 0.9);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border-bottom: 1px solid var(--border);
  }
  .app-header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: 1px;
    text-shadow: 0 0 20px var(--cyan-glow);
  }
  .app-header .icon { font-style: normal; margin-right: 6px; }

  /* ========== TOAST ========== */
  .toast {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    opacity: 0;
    pointer-events: none;
    z-index: 9999;
    background: var(--bg-card);
    backdrop-filter: var(--glass-blur);
    border: 1px solid var(--border-bright);
    color: var(--white);
    padding: 10px 24px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 0 20px var(--cyan-glow);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
  .toast.score { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); color: var(--accent); }
  .toast.error { border-color: var(--danger); box-shadow: 0 0 20px var(--danger-glow); color: var(--danger); }

  /* ========== BUTTONS ========== */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 18px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: var(--white);
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary {
    background: linear-gradient(135deg, var(--cyan), #0891b2);
    border: none;
    color: var(--bg-deep);
    box-shadow: 0 0 20px var(--cyan-glow);
  }
  .btn-primary:hover { box-shadow: 0 0 30px var(--cyan-glow); }
  .btn-success {
    background: linear-gradient(135deg, var(--success), #059669);
    border: none;
    color: var(--bg-deep);
    box-shadow: 0 0 20px var(--success-glow);
  }
  .btn-danger {
    background: linear-gradient(135deg, var(--danger), #dc2626);
    border: none;
    color: white;
    box-shadow: 0 0 20px var(--danger-glow);
  }
  .btn-outline {
    border: 1px solid var(--cyan-dim);
    color: var(--cyan);
  }
  .btn-outline:hover { background: var(--cyan-subtle); }
  .btn-ghost {
    border: 1px solid var(--border);
    color: var(--white-dim);
  }
  .btn-ghost:hover { border-color: var(--border-bright); color: var(--white); }
  .btn-full { width: 100%; }
  .btn-lg { padding: 14px 20px; font-size: 15px; border-radius: var(--radius); }
  .btn-sm { padding: 6px 12px; font-size: 11px; }

  /* ========== GLASS CARD ========== */
  .card {
    background: var(--bg-glass);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin: 0 16px 16px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
    text-shadow: 0 0 10px var(--cyan-glow);
  }

  /* ========== SETUP SCREEN ========== */
  .setup-hero {
    text-align: center;
    padding: 32px 20px 20px;
  }
  .setup-hero h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--cyan);
    text-shadow: 0 0 30px var(--cyan-glow);
    margin-bottom: 8px;
  }
  .setup-hero p {
    font-size: 13px;
    color: var(--white-dim);
  }

  .team-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 500px) { .team-grid { grid-template-columns: 1fr; } }

  .team-badge {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 1px;
    font-family: 'Orbitron', sans-serif;
    margin-bottom: 10px;
  }
  .team-badge.a {
    background: linear-gradient(135deg, var(--cyan), #0891b2);
    color: var(--bg-deep);
    box-shadow: 0 0 12px var(--cyan-glow);
  }
  .team-badge.b {
    background: linear-gradient(135deg, var(--accent), #d97706);
    color: var(--bg-deep);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .form-group { margin-bottom: 12px; }
  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--white-dim);
    margin-bottom: 5px;
    letter-spacing: 0.5px;
  }
  .form-input, .form-textarea, .form-select {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
    background: rgba(15, 23, 42, 0.8);
    color: var(--white);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus {
    outline: none;
    border-color: var(--cyan);
    box-shadow: 0 0 12px var(--cyan-glow);
  }
  .form-textarea { min-height: 100px; resize: vertical; line-height: 1.6; }
  .form-select-wrap { position: relative; }
  .form-select { appearance: none; padding-right: 30px; cursor: pointer; }
  .form-select-wrap::after {
    content: '▼';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 10px;
    color: var(--cyan-dim);
    pointer-events: none;
  }
  .settings-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  @media (max-width: 500px) { .settings-grid { grid-template-columns: 1fr; } }

  /* ========== GAME SCREEN ========== */
  .game-scroll {
    max-height: calc(100dvh - 50px);
    overflow-y: auto;
    padding-bottom: 32px;
    scroll-behavior: smooth;
    scrollbar-width: none;
  }
  .game-scroll::-webkit-scrollbar { display: none; }

  /* Score Bar */
  .score-bar {
    margin: 16px;
    padding: 20px;
    background: var(--bg-glass);
    backdrop-filter: var(--glass-blur);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow), inset 0 1px 0 rgba(6,182,212,0.1);
  }
  .score-main {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 12px;
  }
  .score-team { text-align: center; flex: 1; }
  .score-team-name {
    font-size: 12px;
    font-weight: 700;
    color: var(--white-dim);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .score-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 48px;
    font-weight: 900;
    color: var(--cyan);
    text-shadow: 0 0 30px var(--cyan-glow), 0 0 60px rgba(6,182,212,0.15);
    line-height: 1;
  }
  .score-divider {
    font-family: 'Orbitron', sans-serif;
    font-size: 24px;
    color: var(--white-muted);
  }
  .score-meta {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .score-chip {
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 700;
    background: rgba(6,182,212,0.1);
    color: var(--cyan);
    border: 1px solid rgba(6,182,212,0.2);
  }
  .score-chip.active-team {
    background: linear-gradient(135deg, var(--cyan), #0891b2);
    color: var(--bg-deep);
    border: none;
    box-shadow: 0 0 12px var(--cyan-glow);
  }

  /* Diamond */
  .diamond-section {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 16px;
    margin-bottom: 16px;
  }
  .diamond-container {
    flex-shrink: 0;
    width: 120px;
    height: 120px;
    position: relative;
  }
  .diamond-inner {
    position: absolute;
    width: 100%;
    height: 100%;
    transform: rotate(45deg);
    top: 0;
    left: 0;
  }
  .base {
    position: absolute;
    width: 28px;
    height: 28px;
    border: 2px solid var(--border-bright);
    border-radius: 4px;
    background: rgba(15,23,42,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
  }
  .base span {
    transform: rotate(-45deg);
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    color: var(--white-muted);
    font-weight: 700;
  }
  .base.occ {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 16px var(--accent-glow);
  }
  .base.occ span { color: var(--bg-deep); }
  .base.first   { bottom: 0; right: 0; }
  .base.second  { top: 0; right: 0; }
  .base.third   { top: 0; left: 0; }
  .base.home    { bottom: 0; left: 0; }

  .game-status { flex: 1; min-width: 0; }

  /* Batter Flip Card */
  /* Batter Flip Card — 3-face carousel via fade */
  .batter-info {
    margin-bottom: 12px;
  }
  .batter-card {
    position: relative;
    min-height: 56px;
  }
  .batter-card-face {
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: opacity 0.5s ease, transform 0.5s ease;
    position: absolute;
    inset: 0;
    opacity: 0;
    transform: translateY(6px);
    pointer-events: none;
  }
  .batter-card-face.face-active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
    position: relative;
  }
  .batter-card-front {
    background: linear-gradient(135deg, rgba(6,182,212,0.15), rgba(6,182,212,0.05));
    border: 1px solid rgba(6,182,212,0.3);
  }
  .batter-card-mid {
    background: linear-gradient(135deg, rgba(168,85,247,0.15), rgba(168,85,247,0.05));
    border: 1px solid rgba(168,85,247,0.3);
  }
  .batter-card-back {
    background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(245,158,11,0.05));
    border: 1px solid rgba(245,158,11,0.3);
  }
  .batter-label {
    font-size: 9px;
    font-weight: 700;
    color: var(--cyan-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    font-family: 'Orbitron', sans-serif;
  }
  .batter-name {
    font-size: 18px;
    font-weight: 900;
    color: var(--white);
    margin-top: 2px;
    word-break: break-all;
    line-height: 1.3;
  }
  .batter-nickname {
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    margin-top: 2px;
  }
  .batter-face-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-family: 'Orbitron', sans-serif;
    margin-bottom: 4px;
  }
  .batter-face-label.total { color: var(--purple); }
  .batter-face-label.game  { color: var(--accent); }
  .batter-face-stats {
    font-size: 12px;
    color: var(--white-dim);
    line-height: 1.5;
  }
  .batter-face-stats b { color: var(--white); }

  /* Count */
  .count-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .count-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--white-muted);
    width: 16px;
    text-align: center;
  }
  .count-dots { display: flex; gap: 6px; }
  .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    transition: all 0.2s;
  }
  .dot.on.strike { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
  .dot.on.ball   { background: var(--success); border-color: var(--success); box-shadow: 0 0 8px var(--success-glow); }
  .dot.on.out    { background: var(--danger); border-color: var(--danger); box-shadow: 0 0 8px var(--danger-glow); }

  /* ========== ACTION SECTION ========== */
  .action-section {
    margin: 0 16px 16px;
    padding: 20px;
    background: var(--bg-glass);
    backdrop-filter: var(--glass-blur);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .action-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: var(--cyan-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  .hit-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 10px;
  }
  .out-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .action-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 12px 4px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: rgba(15,23,42,0.6);
    color: var(--white);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .action-btn:active { transform: scale(0.94); }
  .action-btn .btn-icon { font-size: 18px; }
  .action-btn.hit-hr {
    border-color: rgba(239,68,68,0.4);
    background: rgba(239,68,68,0.08);
  }
  .action-btn.hit-hr:active { box-shadow: 0 0 20px var(--danger-glow); }
  .action-btn.hit-3b { border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.06); }
  .action-btn.hit-2b { border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.06); }
  .action-btn.hit-1b { border-color: rgba(6,182,212,0.3); background: rgba(6,182,212,0.06); }
  .action-btn.act-bb { border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.06); }
  .action-btn.act-k  { border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.06); }
  .action-btn.act-out { border-color: rgba(100,116,139,0.3); background: rgba(100,116,139,0.06); }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }

  .count-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .count-btn {
    padding: 8px;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--white-dim);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .count-btn:active { transform: scale(0.95); }
  .count-btn.strike-btn:hover { border-color: var(--accent); color: var(--accent); }
  .count-btn.ball-btn:hover { border-color: var(--success); color: var(--success); }
  .count-btn.clear-btn:hover { border-color: var(--white-muted); color: var(--white); }

  .util-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* ========== TAB BAR ========== */
  .tab-bar {
    display: flex;
    margin: 0 16px;
    background: var(--bg-glass);
    backdrop-filter: var(--glass-blur);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 16px;
  }
  .tab-item {
    flex: 1;
    text-align: center;
    padding: 10px 0;
    font-size: 12px;
    font-weight: 700;
    color: var(--white-muted);
    cursor: pointer;
    transition: all 0.2s;
    border-right: 1px solid var(--border);
    position: relative;
  }
  .tab-item:last-child { border-right: none; }
  .tab-item.active {
    color: var(--cyan);
    background: rgba(6,182,212,0.1);
  }
  .tab-item.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 20%;
    right: 20%;
    height: 2px;
    background: var(--cyan);
    border-radius: 2px;
    box-shadow: 0 0 8px var(--cyan-glow);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ========== SCORE TABLE ========== */
  .score-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .score-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 280px;
  }
  .score-table th {
    background: rgba(6,182,212,0.15);
    padding: 8px 10px;
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: var(--cyan);
    text-align: center;
    border-bottom: 1px solid var(--border-bright);
    letter-spacing: 1px;
  }
  .score-table td {
    padding: 8px 10px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    color: var(--white-dim);
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 14px;
  }
  .score-table .team-col {
    text-align: left;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    color: var(--white);
    min-width: 80px;
  }
  .score-table th.team-col { font-family: 'Noto Sans JP', sans-serif; }
  .score-table .total-col {
    color: var(--cyan);
    font-size: 16px;
    text-shadow: 0 0 10px var(--cyan-glow);
  }
  .score-table .current-inning {
    color: var(--accent);
    text-shadow: 0 0 8px var(--accent-glow);
  }

  /* ========== LINEUP ========== */
  .lineup-section { margin: 0 16px 16px; }
  .lineup-header { margin-bottom: 10px; }
  .lineup-title { display: flex; align-items: center; gap: 8px; }
  .section-gap { height: 8px; }

  .player-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--bg-glass);
    backdrop-filter: var(--glass-blur);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 6px;
    transition: all 0.2s;
  }
  .player-row.current {
    border-color: var(--cyan);
    background: rgba(6,182,212,0.1);
    box-shadow: 0 0 16px var(--cyan-glow);
  }
  .player-order {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 900;
    color: var(--cyan-dim);

  }
  .player-name {
    font-weight: 700;
    font-size: 14px;
    color: var(--white);
    white-space: nowrap;
  }
  .player-stats-row {
    display: flex;
    gap: 4px;
    margin-left: auto;
    flex-wrap: wrap;
    justify-content: flex-end;

  .stat-chip {
    font-size: 10px;
    font-weight: 600;
    background: rgba(255,255,255,0.06);
    color: var(--white-dim);
    padding: 2px 6px;
    border-radius: 4px;
  }
  .stat-chip.avg {
    background: rgba(6,182,212,0.12);
    color: var(--cyan);
  }

  /* ========== LOG ========== */
  .log-item {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--white-dim);
    line-height: 1.4;
  }
  .log-item:last-child { border-bottom: none; }
  .log-time { font-size: 10px; color: var(--white-muted); margin-top: 2px; }
  .log-item.score-log { color: var(--accent); font-weight: 700; }

  /* ========== STATS TABLE ========== */
  .stats-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* Stats toggle tabs */
  .stats-toggle {
    display: flex;
    margin-bottom: 14px;
    background: rgba(15,23,42,0.6);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .stats-toggle-btn {
    flex: 1;
    text-align: center;
    padding: 8px 0;
    font-size: 12px;
    font-weight: 700;
    color: var(--white-muted);
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    background: transparent;

  .stats-toggle-btn.active {
    color: var(--cyan);
    background: rgba(6,182,212,0.12);
  }
  .stats-toggle-btn.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 20%;
    right: 20%;
    height: 2px;
    background: var(--cyan);
    border-radius: 2px;
    box-shadow: 0 0 6px var(--cyan-glow);
  }

  .stats-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    min-width: 460px;
  }
  .stats-table th {
    background: rgba(6,182,212,0.15);
    padding: 7px 8px;
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    font-weight: 700;
    color: var(--cyan);
    text-align: center;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--border-bright);
    white-space: nowrap;
  }
  .stats-table td {
    padding: 7px 8px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    color: var(--white-dim);
    font-size: 12px;
  }
  .stats-table td:first-child {
    text-align: left;
    font-weight: 700;
    color: var(--white);
    white-space: nowrap;
  }
  .stats-table .team-header td {
    background: rgba(6,182,212,0.08);
    color: var(--cyan);
    font-weight: 900;
    font-size: 11px;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--border-bright);
    padding: 6px 8px;
  }
  .stats-table .avg-cell {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    color: var(--cyan);
    font-size: 11px;
  }

  /* ========== OVERLAY ========== */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    visibility: hidden;
    opacity: 0;
    transition: all 0.3s;
  }
  .overlay.open { visibility: visible; opacity: 1; }
  .overlay-box {
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
    background: var(--bg-card-solid);
    border: 1px solid var(--border-bright);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 24px;
    transform: translateY(100%);

  }
  .overlay.open .overlay-box { transform: translateY(0); }
  .overlay-handle {
    width: 40px;
    height: 4px;
    background: var(--border-bright);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .overlay-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 900;
    color: var(--cyan);
    text-align: center;
    margin-bottom: 16px;
    text-shadow: 0 0 16px var(--cyan-glow);
  }

  /* Winner Banner */
  .winner-banner {
    text-align: center;
    padding: 20px;
    border-radius: var(--radius);

    background: linear-gradient(135deg, rgba(6,182,212,0.2), rgba(168,85,247,0.15));
    border: 1px solid rgba(6,182,212,0.3);

  .winner-label {

  }

  .section-h {
    font-size: 12px;

    color: var(--cyan);
    margin: 16px 0 8px;
    font-family: 'Orbitron', sans-serif;

  /* Scrollbar for overlay */
  .overlay-box::-webkit-scrollbar { width: 4px; }
  .overlay-box::-webkit-scrollbar-track { background: transparent; }
  .overlay-box::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }
</style>
</head>
<body>

<!-- TOAST -->

<!-- HEADER -->

<!-- ========== SETUP SCREEN ========== -->

<div id="screen-game" class="screen game-scroll">

      Google Apps Script の WebアプリURLを入力してください。<br>
      初回設定の手順は <strong>gas_setup.md</strong> を参照。
    </p>
    <div class="form-group">
      <label class="form-label">Apps Script URL</label>
      <input class="form-input" id="gasUrl" placeholder="https://script.google.com/macros/s/.../exec" />
    </div>

      ※ URLは次回も使えるようにブラウザに保存されます
    </div>

      <button class="btn btn-ghost btn-full" onclick="closeSheetModal()">キャンセル</button>

<script>
/* ========== STATE ========== */
let match = null;
let historyStack = [];
let currentTab = 'board';
let statsMode = 'game'; // 'game' = today's game only, 'total' = cumulative
let count = { strikes: 0, balls: 0 };

/* ========== GAS URL 共有管理 ========== */
function getGasUrl() {
  // セットアップ画面の入力 → シートモーダルの入力 → localStorage の優先順
  const fromSetup = document.getElementById('gasUrlSetup')?.value.trim();
  const fromModal = document.getElementById('gasUrl')?.value.trim();
  return fromSetup || fromModal || localStorage.getItem('gasUrl') || '';
}
function setGasUrl(url) {
  if (!url) return;
  localStorage.setItem('gasUrl', url);
  const s = document.getElementById('gasUrlSetup');
  const m = document.getElementById('gasUrl');
  if (s) s.value = url;
  if (m) m.value = url;
}

// ページ読み込み時にURLを復元（自動読み込みなし）
window.addEventListener('load', () => {
  const saved = localStorage.getItem('gasUrl') || '';
  if (saved) {
    const s = document.getElementById('gasUrlSetup');
    if (s) s.value = saved;
  }
});

/* ========== スプレッドシートから読み込み ========== */
async function loadFromSheet() {
  const url = getGasUrl();
  if (!url) {
    showLoadStatus('URLを入力してください', 'error');
    return;
  }
  setGasUrl(url);
  showLoadStatus('読み込み中...', 'info');

  try {
    const res = await fetch(`${url}?action=load`, { method: 'GET' });
    const json = await res.json();
    if (json.status !== 'ok') {
      showLoadStatus('読み込み失敗：' + (json.message || 'エラー'), 'error');
      return;
    }

    // チームA・B の選手名をテキストエリアに反映（不要なので削除）
    const teams = json.teams || {};

    // 累積成績・異名をグローバルに保持（試合開始後に適用）
    window._sheetStats = json.stats || {};
    // 異名マップ: { 選手名: 異名 }
    window._nicknames = {};
    Object.entries(window._sheetStats).forEach(([name, s]) => {
      if (s.nickname) window._nicknames[name] = s.nickname;
    });

    const total = Object.keys(window._sheetStats).length;
    showLoadStatus(`✅ ${total}人の成績を読み込みました`, 'success');
  } catch (err) {
    showLoadStatus('読み込み失敗：' + err.message, 'error');
  }
}

function showLoadStatus(msg, type) {
  const el = document.getElementById('loadStatus');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = type === 'success' ? '#f0fdf4' : type === 'error' ? '#fef2f2' : '#eff6ff';
  el.style.color = type === 'success' ? '#15803d' : type === 'error' ? '#dc2626' : '#1d4ed8';
}

/* ========== HELPERS ========== */
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]);
}
function calcAvg(hits, ab) {
  if (!ab) return '.---';
  const v = hits / ab;
  return '.' + String(Math.round(v * 1000)).padStart(3, '0');
}
function calcObp(hits, walks, pa) {
  if (!pa) return '.---';
  const v = (hits + walks) / pa;
  return '.' + String(Math.round(v * 1000)).padStart(3, '0');
}
// 累積成績込みの値を返す
function totalVal(p, key) {
  return (p[key] || 0) + (p['_prev' + key.charAt(0).toUpperCase() + key.slice(1)] || 0);
}
function totalAvg(p) {
  const ab = totalVal(p, 'ab');
  const hits = totalVal(p, 'hits');
  return calcAvg(hits, ab);
}
function totalObp(p) {
  const pa = totalVal(p, 'pa');
  const hits = totalVal(p, 'hits');
  const walks = totalVal(p, 'walks');
  return calcObp(hits, walks, pa);
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' ' + type : '') + ' show';
  setTimeout(() => { t.className = 'toast' + (type ? ' ' + type : ''); }, 2000);
}

/* ========== PLAYER / TEAM FACTORIES ========== */
function makePlayer(nameOrObj) {
  if (typeof nameOrObj === 'object' && nameOrObj !== null) {
    const { name, nickname } = nameOrObj;
    return { name, nickname: nickname || '', pa:0, ab:0, hits:0, doubles:0, triples:0, hrs:0, ks:0, walks:0, rbi:0 };
  }
  return { name: nameOrObj, nickname: '', pa:0, ab:0, hits:0, doubles:0, triples:0, hrs:0, ks:0, walks:0, rbi:0 };
}
function parsePlayersFromTA(text, lineupSize) {
  const lines = (text || '').split('\n').map(s => s.trim()).filter(Boolean);
  const arr = lines.slice(0, lineupSize).map(line => {
    const [name, nickname] = line.split(',').map(s => s.trim());
    return { name: name || line, nickname: nickname || '' };
  });
  for (let i = arr.length; i < lineupSize; i++) arr.push({ name: `選手${i+1}`, nickname: '' });
  return arr;
}
function createTeam(name, playersArr, maxI) {
  const players = (playersArr || []).map(makePlayer);
  return {
    name: name || 'チーム',
    players,
    scores: Array.from({ length: parseInt(maxI || 0, 10) }, () => 0),
    total: 0,
    battingIndex: 0,
    outs: 0,
    bases: [null, null, null]
  };
}

/* ========== HISTORY ========== */
function pushHistory() {
  if (!match) return;
  historyStack.push(JSON.stringify({ match, count }));
  if (historyStack.length > 500) historyStack.shift();
}

/* ========== LOGGING ========== */
function addLog(text, isScore = false) {
  if (!match) return;
  const team = match.teams[match.currentTeam];
  const entry = { text, inning: match.inning, teamName: team.name, isScore };
  match.log.unshift(entry);
  if (match.log.length > 500) match.log.pop();
}

/* ========== SCORE HELPERS ========== */
function ensureScoresLength() {
  if (!match) return;
  const need = parseInt(match.maxInnings || 0, 10);
  match.teams.forEach(t => {
    if (!Array.isArray(t.scores)) t.scores = Array.from({ length: need }, () => 0);
    while (t.scores.length < need) t.scores.push(0);
    if (t.scores.length > need) t.scores = t.scores.slice(0, need);
  });
}
function recalcTotals() {
  if (!match) return;
  ensureScoresLength();
  match.teams.forEach(t => {
    t.total = (t.scores || []).reduce((s, v) => s + (Number.isFinite(v) ? v : 0), 0);
  });
}

/* ========== COUNT ========== */
function addStrike() {
  if (!match) return;
  count.strikes = Math.min(count.strikes + 1, 2);
  refreshCountDots();
}
function addBall() {
  if (!match) return;
  count.balls = Math.min(count.balls + 1, 3);
  refreshCountDots();
}
function clearCount() {
  count = { strikes: 0, balls: 0 };
  refreshCountDots();
}
function refreshCountDots() {
  const maxS = 2, maxB = 3;
  const maxO = match ? match.outsToChange : 3;
  const outs = match ? match.teams[match.currentTeam].outs : 0;

  const sd = document.getElementById('strikeDots');
  const bd = document.getElementById('ballDots');
  const od = document.getElementById('outDots');
  if (!sd) return;

  sd.innerHTML = Array.from({ length: maxS }, (_, i) =>
    `<div class="dot${i < count.strikes ? ' on strike' : ''}"></div>`).join('');
  bd.innerHTML = Array.from({ length: maxB }, (_, i) =>
    `<div class="dot${i < count.balls ? ' on ball' : ''}"></div>`).join('');
  od.innerHTML = Array.from({ length: maxO }, (_, i) =>
    `<div class="dot${i < outs ? ' on out' : ''}"></div>`).join('');
}

/* ========== ADVANCE LOGIC ========== */
function advanceOnHit(team, hitType, batterIndex) {
  let runs = 0;
  const b = team.bases;
  if (hitType === '1B') {
    if (b[2] !== null) { runs++; b[2] = null; }
    b[2] = b[1]; b[1] = b[0]; b[0] = batterIndex;
  } else if (hitType === '2B') {
    if (b[2] !== null) { runs++; }
    if (b[1] !== null) { runs++; }
    b[2] = b[0]; b[1] = batterIndex; b[0] = null;
  } else if (hitType === '3B') {
    for (let i = 0; i < 3; i++) { if (b[i] !== null) { runs++; b[i] = null; } }
    b[2] = batterIndex; b[1] = null; b[0] = null;
  } else if (hitType === 'HR') {
    for (let i = 0; i < 3; i++) { if (b[i] !== null) { runs++; b[i] = null; } }
    runs++;
  }
  return runs;
}
function processWalk(team, batterIndex) {
  const old = team.bases.slice();
  if (old[0] === null) { team.bases[0] = batterIndex; return 0; }
  if (old[1] === null) { team.bases[1] = old[0]; team.bases[0] = batterIndex; return 0; }
  if (old[2] === null) { team.bases[2] = old[1]; team.bases[1] = old[0]; team.bases[0] = batterIndex; return 0; }
  team.bases[2] = old[1]; team.bases[1] = old[0]; team.bases[0] = batterIndex;
  return 1;
}

/* ========== GAME START ========== */
function startMatch() {
  const maxI = parseInt(document.getElementById('maxInnings').value, 10) || 3;
  const outsToChange = parseInt(document.getElementById('outsToChange').value, 10) || 3;
  const lineupSize = Math.max(1, Math.min(9, parseInt(document.getElementById('lineupSize').value, 10) || 3));
  const Aname = document.getElementById('teamAName').value || 'チームA';
  const Bname = document.getElementById('teamBName').value || 'チームB';
  const Aplayers = parsePlayersFromTA(document.getElementById('teamAPlayersTA').value, lineupSize);
  const Bplayers = parsePlayersFromTA(document.getElementById('teamBPlayersTA').value, lineupSize);

  match = {
    maxInnings: maxI,
    outsToChange,
    inning: 1,
    currentTeam: 0,
    halfInningCount: 0,
    lineupSize,
    teams: [
      createTeam(Aname, Aplayers, maxI),
      createTeam(Bname, Bplayers, maxI)
    ],
    finished: false,
    log: []
  };

  // スプレッドシートから読み込んだ累積成績を適用
  if (window._sheetStats) {
    match.teams.forEach(t => {
      t.players.forEach(p => {
        const s = window._sheetStats[p.name];
        if (s) {
          p._prevGames   = s.games   || 0;
          p._prevPa      = s.pa      || 0;
          p._prevAb      = s.ab      || 0;
          p._prevHits    = s.hits    || 0;
          p._prevDoubles = s.doubles || 0;
          p._prevTriples = s.triples || 0;
          p._prevHrs     = s.hrs     || 0;
          p._prevWalks   = s.walks   || 0;
          p._prevKs      = s.ks      || 0;
          p._prevRbi     = s.rbi     || 0;
          if (s.nickname) p.nickname = s.nickname;
        }
      });
    });
  }

  recalcTotals();
  historyStack = [];
  count = { strikes: 0, balls: 0 };

  showScreen('game');
  refreshUI();
}

/* ========== SCREEN SWITCH ========== */
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  if (name === 'game') {
    document.getElementById('headerRight').innerHTML =
      `<button class="btn btn-ghost btn-sm" onclick="resetAll()">リセット</button>`;
  } else {
    document.getElementById('headerRight').innerHTML = '';
  }
}

/* ========== TAB SWITCH ========== */
function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab-item').forEach((el, i) => {
    el.classList.toggle('active', ['board','lineup','stats','log'][i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'stats') buildStatsTable();
}

/* ========== RESULT ACTION ========== */
function doResult(code) {
  if (!match || match.finished) return;
  pushHistory();

  const team = match.teams[match.currentTeam];
  const pIndex = team.battingIndex % team.players.length;
  const player = team.players[pIndex];
  const inningIdx = match.inning - 1;

  player.pa = (player.pa || 0) + 1;

  if (code === 'OUT' || code === 'FOUT') {
    player.ab = (player.ab || 0) + 1;
    team.outs++;
    addLog(`${player.name} がアウト`);
    showToast(`${player.name} アウト`);
  } else if (code === 'K') {
    player.ab = (player.ab || 0) + 1;
    player.ks = (player.ks || 0) + 1;
    team.outs++;
    addLog(`${player.name} が三振`);
    showToast(`${player.name} 三振 K`);
  } else if (code === 'BB') {
    player.walks = (player.walks || 0) + 1;
    const runs = processWalk(team, pIndex);
    if (runs > 0) {
      player.rbi = (player.rbi || 0) + runs;
      ensureScoresLength();
      team.scores[inningIdx] = (team.scores[inningIdx] || 0) + runs;
      recalcTotals();
      addLog(`${player.name} 押し出し → ${runs}点`, true);
      showToast(`押し出し +${runs}点！`, 'score');
    } else {
      addLog(`${player.name} 四球`);
      showToast(`${player.name} 四球`);
    }
  } else {
    player.ab = (player.ab || 0) + 1;
    player.hits = (player.hits || 0) + 1;
    let runs = 0;
    let hitLabel = '';
    if (code === '1B') { runs = advanceOnHit(team, '1B', pIndex); hitLabel = '1塁打'; }
    if (code === '2B') { player.doubles++; runs = advanceOnHit(team, '2B', pIndex); hitLabel = '2塁打'; }
    if (code === '3B') { player.triples++; runs = advanceOnHit(team, '3B', pIndex); hitLabel = '3塁打'; }
    if (code === 'HR') { player.hrs++; runs = advanceOnHit(team, 'HR', pIndex); hitLabel = '本塁打🔴'; }
    addLog(`${player.name} ${hitLabel}`, runs > 0);
    if (runs > 0) {
      player.rbi = (player.rbi || 0) + runs;
      ensureScoresLength();
      team.scores[inningIdx] = (team.scores[inningIdx] || 0) + runs;
      recalcTotals();
      addLog(`→ ${runs}点入る（${player.name} ${runs}RBI）`, true);
      showToast(`${player.name} ${hitLabel}！ +${runs}点`, 'score');
    } else {
      showToast(`${player.name} ${hitLabel}！`);
    }
  }

  team.battingIndex = (team.battingIndex + 1) % team.players.length;
  clearCount();

  if (team.outs >= match.outsToChange) finishHalfInning();

  refreshUI();
  checkFinish();
}

/* ========== HALF INNING END ========== */
function finishHalfInning() {
  const cur = match.currentTeam;
  match.teams[cur].outs = 0;
  match.teams[cur].bases = [null, null, null];
  match.halfInningCount = (match.halfInningCount || 0) + 1;

  if (cur === 0) {
    match.currentTeam = 1;
  } else {
    match.currentTeam = 0;
    match.inning++;
  }

  if (match.halfInningCount >= match.maxInnings * 2) {
    match.finished = true;
  }
}

/* ========== UTILS ========== */
function forceSwitch() {
  if (!match || match.finished) return;
  pushHistory();
  match.teams[match.currentTeam].outs = match.outsToChange;
  addLog('強制交代');
  finishHalfInning();
  refreshUI();
  checkFinish();
}
function undoLast() {
  if (!historyStack.length) { showToast('取り消す操作がありません'); return; }
  try {
    const prev = JSON.parse(historyStack.pop());
    match = prev.match;
    count = prev.count || { strikes: 0, balls: 0 };
    showScreen('game');
    refreshUI();
    showToast('取り消しました');
  } catch (e) { showToast('取り消し失敗'); }
}
function resetAll() {
  if (!confirm('本当にリセットしますか？')) return;
  match = null; historyStack = []; count = { strikes: 0, balls: 0 };
  showScreen('setup');
}
function loadExample() {
  document.getElementById('teamAName').value = 'ハルカ組';
  document.getElementById('teamAPlayersTA').value = 'ハルカ,右の大砲\nレン,安打製造機\nサトウ,鉄壁の守護神\nナオ,豪快なスイング';
  document.getElementById('teamBName').value = '青空';
  document.getElementById('teamBPlayersTA').value = 'タカ,電光石火\nユウ,沈黙の一撃\nシン,疾風の走者\nマコト,鋼の意志';
  document.getElementById('lineupSize').value = 4;
  document.getElementById('maxInnings').value = '3';
  document.getElementById('outsToChange').value = '3';
  showToast('例データを読み込みました');
}

/* ========== BATTER FLIP CARD ========== */
let _batterFlipTimer = null;
let _batterFaceIdx = 0; // 0=名前, 1=通算, 2=今日

function showBatterFace(idx) {
  _batterFaceIdx = idx;
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById('batterFace' + i);
    if (el) el.classList.toggle('face-active', i === idx);
  }
}

function resetBatterFlip() {
  showBatterFace(0);
  if (_batterFlipTimer) clearInterval(_batterFlipTimer);
  _batterFlipTimer = setInterval(() => {
    showBatterFace((_batterFaceIdx + 1) % 3);
  }, 4000);
}

/* ========== REFRESH UI ========== */
function refreshUI() {
  if (!match) return;
  recalcTotals();

  const t0 = match.teams[0], t1 = match.teams[1];
  const team = match.teams[match.currentTeam];

  document.getElementById('scoreNameA').textContent = t0.name;
  document.getElementById('scoreNameB').textContent = t1.name;
  document.getElementById('scoreA').textContent = t0.total || 0;
  document.getElementById('scoreB').textContent = t1.total || 0;

  const half = match.currentTeam === 0 ? '表' : '裏';
  document.getElementById('inningChip').textContent = `${match.inning}回${half}`;
  document.getElementById('outChip').textContent = `アウト ${team.outs} / ${match.outsToChange}`;
  document.getElementById('attackChip').textContent = `${team.name} 攻撃`;

  // bases
  document.getElementById('base1').classList.toggle('occ', team.bases[0] !== null);
  document.getElementById('base2').classList.toggle('occ', team.bases[1] !== null);
  document.getElementById('base3').classList.toggle('occ', team.bases[2] !== null);

  // batter
  const pIdx = team.players.length ? (team.battingIndex % team.players.length) : 0;
  const p = team.players[pIdx];
  if (p) {
    document.getElementById('currentBatterName').textContent = `${pIdx + 1}. ${p.name}`;
    // 異名: p.nickname → _nicknames[名前] → なし の優先順
    const nick = p.nickname || (window._nicknames && window._nicknames[p.name]) || '';
    document.getElementById('currentBatterNickname').textContent = nick;
    // Face 1: 通算成績
    const tAvg = totalAvg(p);
    const tObp = totalObp(p);
    document.getElementById('currentBatterTotal').innerHTML =
      `打率 <b>${tAvg}</b>　出塁率 <b>${tObp}</b><br>${totalVal(p,'hits')}安打　${totalVal(p,'hrs')}HR　${totalVal(p,'rbi')}打点　${totalVal(p,'pa')}打席`;
    // Face 2: 今日の試合成績
    const gAvg = calcAvg(p.hits||0, p.ab||0);
    const gObp = calcObp(p.hits||0, p.walks||0, p.pa||0);
    document.getElementById('currentBatterGame').innerHTML =
      `打率 <b>${gAvg}</b>　出塁率 <b>${gObp}</b><br>${p.hits||0}安打　${p.hrs||0}HR　${p.rbi||0}打点　${p.pa||0}打席`;
    // カードを表面に戻してタイマーリセット
    resetBatterFlip();
  }

  refreshCountDots();
  buildScoreboard();
  buildLineups();
  buildLog();
  if (currentTab === 'stats') buildStatsTable();
}

/* ========== SCOREBOARD ========== */
function buildScoreboard() {
  const wrap = document.getElementById('scoreTableWrap');
  if (!match) { wrap.innerHTML = ''; return; }
  ensureScoresLength();
  recalcTotals();
  const maxI = match.maxInnings;
  let html = `<table class="score-table"><thead><tr><th class="team-col">チーム</th>`;
  for (let i = 1; i <= maxI; i++) {
    const isCur = (i === match.inning && !match.finished);
    html += `<th${isCur ? ' class="current-inning"' : ''}>${i}</th>`;
  }
  html += `<th>計</th></tr></thead><tbody>`;
  match.teams.forEach(t => {
    html += `<tr><td class="team-col">${escapeHtml(t.name)}</td>`;
    for (let i = 0; i < maxI; i++) {
      const v = Number.isFinite(t.scores[i]) ? t.scores[i] : 0;
      html += `<td>${v}</td>`;
    }
    html += `<td class="total-col">${t.total || 0}</td></tr>`;
  });
  html += `</tbody></table>`;
  wrap.innerHTML = html;
}

/* ========== LINEUPS ========== */
function buildLineups() {
  const wrap = document.getElementById('lineupsWrap');
  if (!match) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = '';
  match.teams.forEach((t, ti) => {
    const div = document.createElement('div');
    div.className = 'lineup-section';
    const badge = ti === 0 ? 'a' : 'b';
    div.innerHTML = `
      <div class="lineup-header">
        <div class="lineup-title"><span class="team-badge ${badge}">${escapeHtml(t.name)}</span></div>
      </div>`;
    t.players.forEach((p, idx) => {
      const isCurrent = (match.currentTeam === ti) && ((t.battingIndex % t.players.length) === idx);
      const avg = totalAvg(p);
      const el = document.createElement('div');
      el.className = 'player-row' + (isCurrent ? ' current' : '');
      el.innerHTML = `
        <div class="player-order">${idx + 1}</div>
        <div class="player-name" onclick="openRenameModal(${ti},${idx})" style="cursor:pointer;" title="タップして名前変更">${escapeHtml(p.name)} <span style="font-size:10px;color:var(--white-muted);">✎</span></div>
        <div class="player-stats-row">
          <span class="stat-chip avg">${avg}</span>
          <span class="stat-chip">${totalVal(p,'pa')}PA</span>
          <span class="stat-chip">${totalVal(p,'hits')}H</span>
          <span class="stat-chip">${totalVal(p,'rbi')}RBI</span>
          ${totalVal(p,'hrs') > 0 ? `<span class="stat-chip">HR×${totalVal(p,'hrs')}</span>` : ''}
        </div>`;
      div.appendChild(el);
    });
    wrap.appendChild(div);
  });
}

/* ========== STATS TABLE ========== */
function setStatsMode(mode) {
  statsMode = mode;
  document.querySelectorAll('.stats-toggle-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.includes(mode === 'game' ? '今日' : '通算'));
  });
  buildStatsTable();
}

function buildStatsTable() {
  const wrap = document.getElementById('statsTableWrap');
  if (!match) { wrap.innerHTML = ''; return; }

  const isGame = (statsMode === 'game');
  // Helper: get value based on mode
  const val = (p, key) => isGame ? (p[key] || 0) : totalVal(p, key);
  const avg = (p) => {
    const ab = val(p, 'ab'), h = val(p, 'hits');
    return calcAvg(h, ab);
  };
  const obp = (p) => {
    const pa = val(p, 'pa'), h = val(p, 'hits'), w = val(p, 'walks');
    return calcObp(h, w, pa);
  };

  let html = `<table class="stats-table">
    <thead><tr>
      <th>選手</th><th>PA</th><th>AB</th><th>H</th><th>2B</th><th>3B</th><th>HR</th>
      <th>K</th><th>BB</th><th>RBI</th><th>打率</th><th>出塁率</th>
    </tr></thead><tbody>`;
  match.teams.forEach(t => {
    html += `<tr class="team-header"><td colspan="12">${escapeHtml(t.name)}</td></tr>`;
    t.players.forEach(p => {
      html += `<tr>
        <td>${escapeHtml(p.name)}</td>
        <td>${val(p,'pa')}</td><td>${val(p,'ab')}</td><td>${val(p,'hits')}</td>
        <td>${val(p,'doubles')}</td><td>${val(p,'triples')}</td><td>${val(p,'hrs')}</td>
        <td>${val(p,'ks')}</td><td>${val(p,'walks')}</td><td>${val(p,'rbi')}</td>
        <td class="avg-cell">${avg(p)}</td><td class="avg-cell">${obp(p)}</td>
      </tr>`;
    });
  });
  html += `</tbody></table>`;
  wrap.innerHTML = html;
}

/* ========== LOG ========== */
function buildLog() {
  const wrap = document.getElementById('logWrap');
  if (!match) { wrap.innerHTML = ''; return; }
  if (!match.log.length) { wrap.innerHTML = '<div class="log-item" style="color:var(--white-muted)">まだ記録がありません</div>'; return; }
  wrap.innerHTML = match.log.slice(0, 100).map(entry => {
    const isObj = typeof entry === 'object';
    const text = isObj ? entry.text : entry;
    const inning = isObj ? entry.inning : '';
    const teamName = isObj ? entry.teamName : '';
    const isScore = isObj ? entry.isScore : false;
    return `<div class="log-item${isScore ? ' score-log' : ''}">
      ${escapeHtml(text)}
      ${inning ? `<div class="log-time">${inning}回 ${teamName}</div>` : ''}
    </div>`;
  }).join('');
}

/* ========== FINISH ========== */
function checkFinish() {
  if (match && match.finished) {
    recalcTotals();
    refreshUI();
    setTimeout(() => showResult(), 200);
  }
}
function showResult() {
  if (!match) return;
  ensureScoresLength();
  recalcTotals();

  const t0 = match.teams[0], t1 = match.teams[1];
  const winner = t0.total > t1.total ? t0 : t1.total > t0.total ? t1 : null;

  let html = '';
  if (winner) {
    html += `<div class="winner-banner">
      <div class="winner-label">🏆 勝者</div>
      <div class="winner-name">${escapeHtml(winner.name)}</div>
      <div class="winner-score">${t0.total} — ${t1.total}</div>
    </div>`;
  } else {
    html += `<div class="winner-banner" style="background:linear-gradient(135deg,#6b7280,#9ca3af)">
      <div class="winner-label">試合終了</div>
      <div class="winner-name">引き分け</div>
      <div class="winner-score">${t0.total} — ${t1.total}</div>
    </div>`;
  }

  // Scoreboard
  html += `<div class="section-h">スコアボード</div>`;
  html += `<div class="score-table-wrap" style="margin-bottom:16px">`;
  html += `<table class="score-table"><thead><tr><th class="team-col">チーム</th>`;
  for (let i = 1; i <= match.maxInnings; i++) html += `<th>${i}</th>`;
  html += `<th>計</th></tr></thead><tbody>`;
  match.teams.forEach(t => {
    html += `<tr><td class="team-col">${escapeHtml(t.name)}</td>`;
    for (let i = 0; i < match.maxInnings; i++) {
      html += `<td>${Number.isFinite(t.scores[i]) ? t.scores[i] : 0}</td>`;
    }
    html += `<td class="total-col">${t.total || 0}</td></tr>`;
  });
  html += `</tbody></table></div>`;

  // HR list
  const hrList = [];
  match.teams.forEach(t => {
    t.players.forEach(p => { if (totalVal(p,'hrs') > 0) hrList.push(`${p.name}（${t.name}）×${totalVal(p,'hrs')}`); });
  });
  if (hrList.length) {
    html += `<div class="section-h">本塁打</div>`;
    html += `<div style="font-size:13px;color:var(--white-dim);margin-bottom:12px">${hrList.join('、')}</div>`;
  }

  // Stats
  html += `<div class="section-h">個人成績</div>`;
  html += `<div class="stats-table-wrap"><table class="stats-table">
    <thead><tr>
      <th>選手</th><th>PA</th><th>H</th><th>HR</th><th>RBI</th><th>BB</th><th>K</th><th>打率</th><th>出塁率</th>
    </tr></thead><tbody>`;
  match.teams.forEach(t => {
    html += `<tr class="team-header"><td colspan="9">${escapeHtml(t.name)}</td></tr>`;
    t.players.forEach(p => {
      html += `<tr>
        <td>${escapeHtml(p.name)}</td>
        <td>${totalVal(p,'pa')}</td><td>${totalVal(p,'hits')}</td><td>${totalVal(p,'hrs')}</td>
        <td>${totalVal(p,'rbi')}</td><td>${totalVal(p,'walks')}</td><td>${totalVal(p,'ks')}</td>
        <td class="avg-cell">${totalAvg(p)}</td>
        <td class="avg-cell">${totalObp(p)}</td>
      </tr>`;
    });
  });
  html += `</tbody></table></div>`;

  document.getElementById('finalSummary').innerHTML = html;
  document.getElementById('resultOverlay').classList.add('open');
}
function closeResult() {
  document.getElementById('resultOverlay').classList.remove('open');
}

/* ========== PITCHER MODAL ========== */
/* ========== RENAME PLAYER ========== */
let _renameTarget = null; // { ti, idx }

function openRenameModal(ti, idx) {
  _renameTarget = { ti, idx };
  const name = match.teams[ti].players[idx].name;
  document.getElementById('renameInput').value = name;
  document.getElementById('renameModal').classList.add('open');
  setTimeout(() => document.getElementById('renameInput').focus(), 100);
}

function closeRenameModal() {
  document.getElementById('renameModal').classList.remove('open');
  _renameTarget = null;
}

function applyRename() {
  if (!_renameTarget) return;
  const newName = document.getElementById('renameInput').value.trim();
  if (!newName) { showToast('名前を入力してください', 'error'); return; }
  const { ti, idx } = _renameTarget;
  const oldName = match.teams[ti].players[idx].name;
  match.teams[ti].players[idx].name = newName;
  // ログの名前も更新
  match.log = match.log.map(entry => {
    if (typeof entry === 'object' && entry.text) {
      return { ...entry, text: entry.text.replaceAll(oldName, newName) };
    }
    if (typeof entry === 'string') return entry.replaceAll(oldName, newName);
    return entry;
  });
  // match はインメモリ管理なので保存不要
  closeRenameModal();
  refreshUI();
  showToast(`${oldName} → ${newName} に変更しました`, 'score');
}

// Enterキーで確定
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('renameModal').classList.contains('open')) {
    applyRename();
  }
  if (e.key === 'Escape' && document.getElementById('renameModal').classList.contains('open')) {
    closeRenameModal();
  }
});

function openPitcherModal() {
  recalcTotals();
  const wrap = document.getElementById('pitcherForms');
  wrap.innerHTML = '';
  match.teams.forEach((t, ti) => {
    const badge = ti === 0 ? 'a' : 'b';
    const saved = (match.pitchers && match.pitchers[ti]) || {};

    // 相手チームのデータから自動計算
    const opp = match.teams[ti === 0 ? 1 : 0];
    const autoBf   = saved.bf   !== undefined ? saved.bf   : opp.players.reduce((s, p) => s + (p.pa || 0), 0);
    const autoH    = saved.hits !== undefined ? saved.hits : opp.players.reduce((s, p) => s + (p.hits || 0), 0);
    const autoK    = saved.ks   !== undefined ? saved.ks   : opp.players.reduce((s, p) => s + (p.ks || 0), 0);
    const autoBb   = saved.walks!== undefined ? saved.walks: opp.players.reduce((s, p) => s + (p.walks || 0), 0);
    const autoR    = saved.runs !== undefined ? saved.runs : (opp.total || 0);
    const autoEr   = saved.er   !== undefined ? saved.er   : (opp.total || 0);
    const autoName = saved.name || (t.players[0] ? t.players[0].name : `投手${ti+1}`);
    const autoIp   = saved.ip  || '';

    wrap.innerHTML += `
      <div style="margin-bottom:20px;">
        <span class="team-badge ${badge}">${escapeHtml(t.name)}</span>
        <div style="font-size:11px;color:var(--white-muted);margin:4px 0 8px;">※ BF・被安打・三振・四球・失点は自動入力済み。投球回と自責点を確認してください。</div>
        <div class="form-group" style="margin-top:8px;">
          <label class="form-label">投手名</label>
          <input class="form-input" id="p_name_${ti}" value="${escapeHtml(autoName)}" placeholder="投手名" />
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div class="form-group">
            <label class="form-label">投球回 (例: 3.1)</label>
            <input class="form-input" type="number" step="0.1" id="p_ip_${ti}" value="${autoIp}" placeholder="3.0" />
          </div>
          <div class="form-group">
            <label class="form-label">打者数 (BF)</label>
            <input class="form-input" type="number" id="p_bf_${ti}" value="${autoBf}" placeholder="0" />
          </div>
          <div class="form-group">
            <label class="form-label">失点</label>
            <input class="form-input" type="number" id="p_r_${ti}" value="${autoR}" placeholder="0" />
          </div>
          <div class="form-group">
            <label class="form-label">自責点</label>
            <input class="form-input" type="number" id="p_er_${ti}" value="${autoEr}" placeholder="0" />
          </div>
          <div class="form-group">
            <label class="form-label">被安打</label>
            <input class="form-input" type="number" id="p_h_${ti}" value="${autoH}" placeholder="0" />
          </div>
          <div class="form-group">
            <label class="form-label">三振</label>
            <input class="form-input" type="number" id="p_k_${ti}" value="${autoK}" placeholder="0" />
          </div>
          <div class="form-group">
            <label class="form-label">四球</label>
            <input class="form-input" type="number" id="p_bb_${ti}" value="${autoBb}" placeholder="0" />
          </div>
        </div>
      </div>`;
  });
  document.getElementById('pitcherModal').classList.add('open');
}
function closePitcherModal() {
  document.getElementById('pitcherModal').classList.remove('open');
}
function savePitcherInputs() {
  if (!match) return;
  match.pitchers = [];
  match.teams.forEach((t, ti) => {
    const ip = parseFloat(document.getElementById(`p_ip_${ti}`)?.value) || 0;
    const er = parseInt(document.getElementById(`p_er_${ti}`)?.value) || 0;
    // ERA = 自責点 × 3 ÷ 投球回
    const era = ip > 0 ? ((er * 3) / ip).toFixed(2) : '---';
    match.pitchers[ti] = {
      name:  document.getElementById(`p_name_${ti}`)?.value.trim() || `投手${ti+1}`,
      ip,
      bf:    parseInt(document.getElementById(`p_bf_${ti}`)?.value)  || 0,
      runs:  parseInt(document.getElementById(`p_r_${ti}`)?.value)   || 0,
      er,
      hits:  parseInt(document.getElementById(`p_h_${ti}`)?.value)   || 0,
      ks:    parseInt(document.getElementById(`p_k_${ti}`)?.value)   || 0,
      walks: parseInt(document.getElementById(`p_bb_${ti}`)?.value)  || 0,
      era
    };
  });
}

/* ========== SHEET MODAL ========== */
function openSheetModal() {
  const saved = getGasUrl();
  document.getElementById('gasUrl').value = saved;
  document.getElementById('sheetStatus').style.display = 'none';
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('sendBtn').textContent = '送信する';
  document.getElementById('sheetModal').classList.add('open');
}
function closeSheetModal() {
  document.getElementById('sheetModal').classList.remove('open');
}

async function sendToSheet() {
  if (!match) return;
  const url = document.getElementById('gasUrl').value.trim();
  if (!url) { showStatus('URLを入力してください', 'error'); return; }

  setGasUrl(url);
  ensureScoresLength();
  recalcTotals();

  // ペイロード組み立て（選手成績：打率降順ソート・選手Xは除外）
  const players = [];
  match.teams.forEach(t => {
    t.players.forEach(p => {
      // 「選手1」「選手2」…のような自動補完名は送信しない
      if (/^選手\d+$/.test(p.name)) return;
      const ab = p.ab || 0;
      const hits = p.hits || 0;
      players.push({
        name: p.name,
        pa: p.pa||0, ab, hits,
        doubles: p.doubles||0, triples: p.triples||0, hrs: p.hrs||0,
        walks: p.walks||0, ks: p.ks||0, rbi: p.rbi||0,
        _avg: ab > 0 ? hits / ab : -1
      });
    });
  });
  players.sort((a, b) => b._avg - a._avg);
  players.forEach(p => delete p._avg);

  const payload = { players, pitchers: match.pitchers || [] };

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';
  showStatus('送信中...', 'info');

  try {
    // GASはno-corsで送信（レスポンスは読めないが書き込みは成功する）
    const encoded = encodeURIComponent(JSON.stringify(payload));
    const getUrl = `${url}?data=${encoded}`;

    // まずGETで試みる（URLが長すぎる場合はPOSTにfallback）
    if (getUrl.length < 2000) {
      await fetch(getUrl, { method: 'GET', mode: 'no-cors' });
    } else {
      await fetch(url, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify(payload)
      });
    }

    showStatus('✅ スプレッドシートに記録しました！', 'success');
    btn.textContent = '✅ 送信完了';
    showToast('スプレッドシートに記録しました！', 'score');
  } catch (err) {
    showStatus('❌ 送信失敗：' + err.message, 'error');
    btn.disabled = false;
    btn.textContent = '送信する';
  }
}

function showStatus(msg, type) {
  const el = document.getElementById('sheetStatus');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = type === 'success' ? '#f0fdf4' : type === 'error' ? '#fef2f2' : '#eff6ff';
  el.style.color = type === 'success' ? '#15803d' : type === 'error' ? '#dc2626' : '#1d4ed8';
}
